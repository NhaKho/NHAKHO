name: YouTube Lakehouse dbt Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-duckdb duckdb motherduck pandas

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          youtube_analytics_lakehouse:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: "md:youtube_analytics_lakehouse"
                threads: 4
          EOF

      - name: dbt debug
        run: dbt debug

      - name: dbt run
        run: dbt run