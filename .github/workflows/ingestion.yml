name: Daily Data Ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ repository về máy ảo của GitHub Actions
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Python để chạy file ingest.py
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Bước 3: Cài đặt các thư viện cần thiết trong requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Bước 4: Chạy file ingest.py để tải dữ liệu từ Hugging Face và nạp vào MotherDuck
      - name: Run ingestion script
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ingest.py
